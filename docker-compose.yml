services:
  syxtrade_python:
    image: syxtrade:v1.0
    build:
      context: .
      dockerfile: ./python/Dockerfile
    container_name: syxtrade_python
    networks:
      - syxtrade_net

  syxtrade_mysql:
    image: mysql:8.0.41
    container_name: syxtrade_mysql
    restart: "no"
    command: 
      - --sql-mode=NO_ENGINE_SUBSTITUTION
      - --log-bin-trust-function-creators=1
      - --ssl=0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: syxtrade
      MYSQL_PASSWORD: syxtrade123
      MYSQL_DATABASE: syxtrade
    ports:
      - "3307:3306"
    volumes:
      - ./db_data:/var/lib/mysql:rw
    networks:
      - syxtrade_net

  syxtrade_php:
    image: syxtrade_monitoring:v1.0
    build:
      context: .
      dockerfile: ./php/Dockerfile
    container_name: syxtrade_php
    working_dir: /var/www/html/laravel
    volumes:
      - ./env/laravel/.env:/var/www/html/laravel/.env
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom-php.ini
    ports:
      - "9001:9000"
    networks:
      - syxtrade_net

  syxtrade_nginx:
    image: nginx:1.18
    container_name: syxtrade_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - syxtrade_php
    networks:
      - syxtrade_net

  syxtrade_phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2
    container_name: syxtrade_phpmyadmin
    restart: "no"
    depends_on:
      - syxtrade_mysql
    environment:
      PMA_HOST: syxtrade_mysql
      PHP_MEMORY_LIMIT: 1024M
    ports:
      - "81:80"
    networks:
      - syxtrade_net

networks:
  syxtrade_net:
