services:
  syxtrade_mysql:
    image: syxtrade-db:v1.0
    build:
      context: ./mysql
      dockerfile: Dockerfile
    container_name: syxtrade_mysql
    restart: "no"
    ports:
      - "3307:3306"
    volumes:
      - ./db_data:/var/lib/mysql:rw
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      retries: 10
    networks:
      - syxtrade_net

  syxtrade_php:
    image: syxtrade_monitoring:v1.0
    build:
      context: .
      dockerfile: ./php/Dockerfile
    container_name: syxtrade_php
    working_dir: /var/www/html/laravel
    volumes:
      - ./env/laravel/.env:/var/www/html/laravel/.env
      - ./php/php.ini:/usr/local/etc/php/conf.d/custom-php.ini
    ports:
      - "9001:9000"
    networks:
      - syxtrade_net

  syxtrade_nginx:
    image: syxtrade_nginx:v1.0
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: syxtrade_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - syxtrade_php
    networks:
      - syxtrade_net

  syxtrade_phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2
    container_name: syxtrade_phpmyadmin
    restart: "no"
    depends_on:
      syxtrade_mysql:
        condition: service_healthy
    environment:
      PMA_HOST: syxtrade_mysql
      PHP_MEMORY_LIMIT: 1024M
    ports:
      - "81:80"
    networks:
      - syxtrade_net

  syxtrade_python:
    image: syxtrade:v1.0
    depends_on:
      syxtrade_mysql:
        condition: service_healthy
    build:
      context: .
      dockerfile: ./python/Dockerfile
    container_name: syxtrade_python
    networks:
      - syxtrade_net

networks:
  syxtrade_net:
